<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tattwas Clock</title>
    <style>
        body{
            margin-top:0px;
        }
        #main-container{
            font-weight: bold;
            font-family: sans-serif;
            text-align: center;
            width: 520px;
            margin: auto;
            background-color: bisque;
            padding-left: 50px;
            padding-right: 50px;
        }
        #ttw-container{
            font-size: 30px;
            width: 193px;
            margin: auto;
        }
        p{
            float: left;
        }
        h1{
            color: #8E1C0C;
            font-size: xx-large;
            text-shadow: 2px 2px 8px #FF0000;
        }
        .icon{
            width: 30px;
            margin-bottom: -4px;
        }
        #help-question{
            font-weight: normal;
            text-align: left;
            background-color: #ab6164;
            color: white;
            width: 400px;
            margin: auto;
            padding: 15px;
            border-radius: 10px;
            display: none;
            overflow: hidden;
        }
        .botao{
            width: 80px;
            background-color: white;
            border: none;
            padding: 10px 0px;
            color: #ab6164;
            border-radius: 5px;
        }
        .botao-menu{
            width: 80px;
            background-color: #ab6164;
            border: none;
            padding: 10px 0px;
            color: white;
            margin: 0px;
        }

    </style>
</head>
<body>

<div id="main-container">
    <br>
    <h1>TATTWAS CLOCK <img src="question.svg" alt="Question Icon" class="icon" onclick="expandColapseQuestionHelp()" ></h1>
    <div id="help-question">
        O relógio táttwico nos ajuda a saber em qual tattwa estamos sendo regidos neste exato momento.<br>
        A esquerda está o nome do tattwa e a direita está o cronômetro de minutos e segundos retrógrado.<br>
        <br>
        <div style="text-align: center;">
            <button onclick="expandColapseQuestionHelp()" class="botao" type="button">fechar</button>
        </div>
    </div>
    <div id="ttw-container">
        <p id="tattwa" style="color: black;" >Tattwa&nbsp;</p>
        <div style="color: #143F78;">
            <p id="minutos" >00</p><p>:</p><p id="segundos" >00</p>
        </div>
        <br>
    </div>
    <div id="instructions-container">
        <div id="instructions-menu">
            <button class="botao-menu" >Tattwas</button><button class="botao-menu" style="background-color: black;" >Akasha</button><button class="botao-menu" style="background-color: #056EF7;" >Vayu</button><button class="botao-menu" style="background-color: #AB1C0C;" >Tejas</button><button class="botao-menu" style="background-color: #5E2B25;" >Prithivi</button><button class="botao-menu" style="background-color: #0D1D78;" >Apas</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
